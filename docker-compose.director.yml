version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Reeltime Director Stack
#
# This file is generated from director.config.yaml by running:
#   node director/src/director.js generate > docker-compose.director.yml
#
# Director : http://localhost:10000
# Channel 1 (reeltime-channel_1): http://localhost:10001
# Channel 2 (reeltime-channel_2): http://localhost:10002
#
# Usage:
#   1. Copy config files:
#        cp director/director.config.example.yaml director.config.yaml
#        cp config.example.yaml channel1.config.yaml
#        cp config.example.yaml channel2.config.yaml
#   2. Edit each config to taste (stream.name in each channel config is how
#      Director names and identifies that channel).
#   3. Generate the compose file:
#        node director/src/director.js generate > docker-compose.director.yml
#   4. docker compose -f docker-compose.director.yml up --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  director:
    build:
      context: ./director
      dockerfile: Dockerfile
    container_name: reeltime-director
    restart: unless-stopped
    ports:
      - "10000:10000"
    volumes:
      - ./director.config.yaml:/config/director.config.yaml:ro
      - ./channel1.config.yaml:/config/channel1.config.yaml:ro
      - ./channel2.config.yaml:/config/channel2.config.yaml:ro
    environment:
      PORT:            "10000"
      DIRECTOR_CONFIG: "/config/director.config.yaml"
    depends_on:
      - reeltime-channel_1
      - reeltime-channel_2
    healthcheck:
      test:         ["CMD", "wget", "-qO", "/dev/null", "http://localhost:10000/health"]
      interval:     30s
      timeout:      10s
      start_period: 30s
      retries:      3

  reeltime-channel_1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reeltime-channel_1
    restart: unless-stopped
    ports:
      - "10001:8080"
    volumes:
      - ./channel1.config.yaml:/config/config.yaml:ro
    environment:
      PORT:             "8080"
      HLS_SEG:          "${HLS_SEG:-6}"
      HLS_SIZE:         "${HLS_SIZE:-10}"
      RESOLUTION:       "${RESOLUTION:-1280:720}"
      VIDEO_BITRATE:    "${VIDEO_BITRATE:-2000k}"
      AUDIO_BITRATE:    "${AUDIO_BITRATE:-128k}"
      FRAMERATE:        "${FRAMERATE:-30}"
      FFMPEG_THREADS:   "${FFMPEG_THREADS:-0}"
      PASSES_PER_CYCLE: "${PASSES_PER_CYCLE:-3}"
    healthcheck:
      test:         ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval:     30s
      timeout:      10s
      start_period: 90s
      retries:      3

  reeltime-channel_2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: reeltime-channel_2
    restart: unless-stopped
    ports:
      - "10002:8080"
    volumes:
      - ./channel2.config.yaml:/config/config.yaml:ro
    environment:
      PORT:             "8080"
      HLS_SEG:          "${HLS_SEG:-6}"
      HLS_SIZE:         "${HLS_SIZE:-10}"
      RESOLUTION:       "${RESOLUTION:-1280:720}"
      VIDEO_BITRATE:    "${VIDEO_BITRATE:-2000k}"
      AUDIO_BITRATE:    "${AUDIO_BITRATE:-128k}"
      FRAMERATE:        "${FRAMERATE:-30}"
      FFMPEG_THREADS:   "${FFMPEG_THREADS:-0}"
      PASSES_PER_CYCLE: "${PASSES_PER_CYCLE:-3}"
    healthcheck:
      test:         ["CMD", "wget", "-qO", "/dev/null", "http://localhost:8080/health"]
      interval:     30s
      timeout:      10s
      start_period: 90s
      retries:      3

