<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reeltime Director</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080a0f;
      color: #dde4f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      background: #0f1117;
      border-bottom: 1px solid #1c2033;
    }
    .header-title {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: #00d4ff;
      text-shadow: 0 0 10px #00d4ff88;
    }
    .header-clock {
      font-size: 0.9rem;
      color: #8892a4;
      font-variant-numeric: tabular-nums;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 24px;
    }

    /* Card */
    .card {
      background: #0f1117;
      border: 1px solid #1c2033;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #2c3050; }
    .card.offline { opacity: 0.45; }
    .card-name {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .card-title {
      font-size: 0.95rem;
      color: #dde4f0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .progress-wrap {
      height: 4px;
      background: #1c2033;
      border-radius: 2px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s;
    }
    .card-meta { font-size: 0.78rem; color: #8892a4; }
    .card-next { font-size: 0.82rem; color: #8892a4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .card-next .label { color: #5a6278; }
    .offline-badge { color: #8892a4; font-size: 0.85rem; letter-spacing: 0.1em; }
    .watch-btn {
      display: inline-block;
      margin-top: 4px;
      padding: 6px 14px;
      border: 1px solid;
      border-radius: 4px;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      align-self: flex-start;
      transition: background 0.15s;
    }
    .watch-btn:hover { background: #ffffff0d; }

    /* Footer */
    .footer {
      border-top: 1px solid #1c2033;
      padding: 16px 24px;
      display: flex;
      gap: 24px;
      font-size: 0.82rem;
      color: #5a6278;
      flex-wrap: wrap;
    }
    .footer a:hover { color: #dde4f0; }
  </style>
</head>
<body>
  <header class="header">
    <div class="header-title" id="director-title">&#127916; Reeltime Director</div>
    <div class="header-clock" id="clock">UTC</div>
  </header>

  <main class="grid" id="guide-grid"></main>

  <footer class="footer">
    <a href="/channels.m3u">&#128250; channels.m3u</a>
    <a href="/xmltv">&#128197; XMLTV guide</a>
    <a href="/health">&#128994; health</a>
  </footer>

  <script>
    (function () {
      var NEON = ['#00d4ff', '#39ff14', '#ff2d78'];

      function esc(s) {
        return String(s)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function updateClock() {
        var now = new Date();
        var p = function (n) { return String(n).padStart(2, '0'); };
        document.getElementById('clock').textContent =
          now.getUTCFullYear() + '-' +
          p(now.getUTCMonth() + 1) + '-' +
          p(now.getUTCDate()) + ' ' +
          p(now.getUTCHours()) + ':' +
          p(now.getUTCMinutes()) + ':' +
          p(now.getUTCSeconds()) + ' UTC';
      }

      function renderCards(data) {
        if (data.name) {
          document.title = data.name;
          document.getElementById('director-title').textContent = '\uD83C\uDFAC ' + data.name;
        }

        var html = (data.channels || []).map(function (ch, i) {
          var neon   = NEON[i % NEON.length];
          var online = ch.online || false;
          var now    = ch.now    || null;

          if (!online) {
            return '<div class="card offline">' +
              '<div class="card-name" style="color:' + neon + '">' + esc(ch.name) + '</div>' +
              '<div class="offline-badge">&#9679; OFFLINE</div>' +
              '</div>';
          }

          var title    = now && now.title    ? esc(now.title)    : '&mdash;';
          var progress = now && now.progress != null ? Math.round(now.progress * 100) : 0;
          var rem      = now && now.remaining != null ? Math.ceil(now.remaining / 60) : 0;
          var next     = now && now.next     ? esc(now.next)     : '&mdash;';

          return '<div class="card">' +
            '<div class="card-name" style="color:' + neon + '">' + esc(ch.name) + '</div>' +
            '<div class="card-title">' + title + '</div>' +
            '<div class="progress-wrap">' +
              '<div class="progress-bar" style="width:' + progress + '%;background:' + neon + '"></div>' +
            '</div>' +
            '<div class="card-meta">' + progress + '% &mdash; ' + rem + ' min remaining</div>' +
            '<div class="card-next"><span class="label">Next:</span> ' + next + '</div>' +
            '<a class="watch-btn" href="/watch/' + encodeURIComponent(ch.id) + '" ' +
              'style="border-color:' + neon + ';color:' + neon + '">&#9654; WATCH</a>' +
            '</div>';
        }).join('\n');

        document.getElementById('guide-grid').innerHTML = html;
      }

      function fetchAndRender() {
        fetch('/now')
          .then(function (r) { return r.json(); })
          .then(renderCards)
          .catch(function () {});
      }

      updateClock();
      setInterval(updateClock, 1000);
      fetchAndRender();
      setInterval(fetchAndRender, 10000);
    })();
  </script>
</body>
</html>
